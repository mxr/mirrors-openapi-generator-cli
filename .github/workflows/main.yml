name: main
on:
  pull_request:
  push:
    branches: [main]
  schedule:
  - cron: '15 8 * * *'

permissions: {}

jobs:
  zizmor:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd   # v6.0.2
      with:
        persist-credentials: false
    - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e   # v0.5.3
  build:
    name: main
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
    - run: pip install git+https://github.com/pre-commit/pre-commit-mirror-maker@3ba0917481261fbcac7ab75ca02c23afc163f4b7
    - run: git config --global user.name 'Github Actions'
    - run: git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
    - run: |
        pre-commit-mirror . \
          --language python \
          --package-name 'openapi-generator-cli[jdk4py]' \
          --id openapi-generator-cli \
          --entry openapi-generator-cli \
          --files-regex '(^|/)(openapi|.*[.](json|ya?ml))$' \
          --no-pass-filenames
    - run: |
        git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/$GITHUB_REPOSITORY
        git push origin HEAD:refs/heads/main --tags
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
